<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captain White</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #39ff5a;
      --dim-green: #1a7a2a;
      --glow: rgba(57,255,90,0.18);
      --bg: #040a04;
      --panel: #060e06;
      --border: #1a3a1a;
      --text: #b8e8b8;
      --muted: #4a7a4a;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Orbitron', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Stars */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(57,255,90,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(57,255,90,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 8%,  rgba(57,255,90,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 60%, rgba(57,255,90,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 20%, rgba(57,255,90,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 75%, rgba(57,255,90,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 35%, rgba(57,255,90,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(57,255,90,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(57,255,90,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 55%, rgba(57,255,90,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 10%, rgba(57,255,90,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  50%, rgba(57,255,90,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .player {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
    }

    /* UFO SVG header */
    .ufo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .ufo {
      display: inline-block;
      animation: hover 3s ease-in-out infinite;
    }

    @keyframes hover {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .beam {
      animation: beam-pulse 2s ease-in-out infinite;
      transform-origin: top center;
    }

    @keyframes beam-pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* Title */
    .title-block {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--green);
      text-shadow: 0 0 12px var(--green), 0 0 30px rgba(57,255,90,0.4);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Panel */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px 28px 24px;
      box-shadow: 0 0 40px rgba(57,255,90,0.06), inset 0 0 40px rgba(0,0,0,0.4);
      position: relative;
    }

    /* Corner accents */
    .panel::before, .panel::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--green);
      border-style: solid;
    }
    .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* Waveform / VU bars */
    .vu-bars {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 40px;
      margin-bottom: 20px;
    }

    .vu-bar {
      width: 5px;
      background: var(--dim-green);
      border-radius: 2px 2px 0 0;
      transition: height 0.08s;
    }

    .playing .vu-bar { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* Progress */
    .progress-wrap { margin-bottom: 16px; }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      cursor: pointer;
      position: relative;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      width: 0%;
      transition: width 0.1s linear;
      pointer-events: none;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      transition: color 0.2s, text-shadow 0.2s;
      font-family: inherit;
    }
    .ctrl-btn:hover { color: var(--green); text-shadow: 0 0 10px var(--green); }

    .play-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--green);
      background: transparent;
      color: var(--green);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(57,255,90,0.3), inset 0 0 16px rgba(57,255,90,0.05);
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }
    .play-btn:hover {
      background: rgba(57,255,90,0.1);
      box-shadow: 0 0 28px rgba(57,255,90,0.5), inset 0 0 20px rgba(57,255,90,0.1);
    }
    .play-btn:active { transform: scale(0.95); }

    /* Tracklist */
    .tracklist {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }
    .track {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .track:hover { background: rgba(57,255,90,0.04); border-color: var(--dim-green); }
    .track.active { border-color: var(--green); background: rgba(57,255,90,0.06); }
    .track-num { font-size: 0.65rem; color: var(--muted); width: 16px; text-align: center; flex-shrink: 0; }
    .track.active .track-num { color: var(--green); }
    .track-title { flex: 1; font-size: 0.72rem; letter-spacing: 0.08em; color: var(--text); }
    .track.active .track-title { color: var(--green); text-shadow: 0 0 8px rgba(57,255,90,0.4); }
    .track-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.2s, color 0.2s; }
    .track:hover .track-btn, .track.active .track-btn { border-color: var(--green); color: var(--green); }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 22px 0;
    }

    /* Status line */
    .status {
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--dim-green);
      margin-right: 6px;
      vertical-align: middle;
    }
    .playing-state .status-dot {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 1s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    audio { display: none; }
  </style>
</head>
<body>
<div class="player">

  <div class="ufo-wrap">
    <svg class="ufo" width="140" height="100" viewBox="0 0 140 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Beam -->
      <polygon class="beam" points="55,62 85,62 105,98 35,98" fill="rgba(57,255,90,0.07)" stroke="rgba(57,255,90,0.25)" stroke-width="0.5"/>
      <!-- Dome -->
      <ellipse cx="70" cy="46" rx="22" ry="16" fill="#060e06" stroke="#1a7a2a" stroke-width="1.5"/>
      <ellipse cx="70" cy="46" rx="14" ry="10" fill="#0a180a" stroke="#39ff5a" stroke-width="0.8" opacity="0.7"/>
      <!-- Body -->
      <ellipse cx="70" cy="60" rx="38" ry="10" fill="#060e06" stroke="#1a7a2a" stroke-width="1.5"/>
      <ellipse cx="70" cy="60" rx="38" ry="10" fill="url(#bodygrad)"/>
      <!-- Lights -->
      <circle cx="48" cy="62" r="3" fill="#39ff5a" opacity="0.9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.4s" repeatCount="indefinite"/></circle>
      <circle cx="60" cy="65" r="3" fill="#39ff5a" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="70" cy="66" r="3" fill="#39ff5a" opacity="0.8"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="80" cy="65" r="3" fill="#39ff5a" opacity="0.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.3s" repeatCount="indefinite"/></circle>
      <circle cx="92" cy="62" r="3" fill="#39ff5a" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.0s" repeatCount="indefinite"/></circle>
      <defs>
        <linearGradient id="bodygrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a3a1a" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#040a04" stop-opacity="0.2"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <div class="title-block">
    <h1>CAPTAIN WHITE</h1>
    <p class="subtitle">Transmission Received &mdash; dream ferret</p>
  </div>

  <div class="panel" id="playerPanel">
    <div class="tracklist">
      <div class="track active" data-index="0">
        <span class="track-num">1</span>
        <span class="track-title">CAPTAIN WHITE</span>
        <button class="track-btn">&#9654;</button>
      </div>
      <div class="track" data-index="1">
        <span class="track-num">2</span>
        <span class="track-title">BUTTER, BEEF, BLOOM</span>
        <button class="track-btn">&#9654;</button>
      </div>
    </div>

    <div class="vu-bars" id="vuBars">
      <!-- bars injected by JS -->
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-times">
        <span id="timeElapsed">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="rewindBtn" title="Rewind 10s">&#8634;</button>
      <button class="play-btn" id="playPauseBtn">&#9654;</button>
      <button class="ctrl-btn" id="ffBtn" title="Forward 10s">&#8635;</button>
    </div>

    <hr class="divider">

    <div class="status" id="statusLine">
      <span class="status-dot"></span>
      <span id="statusText">STANDBY</span>
    </div>
  </div>

</div>

<audio id="audio"></audio>

<script>
var TRACKS = [
  { src: "{{ url_for('static', filename='CaptainWhite.mp3') }}",   title: "CAPTAIN WHITE" },
  { src: "{{ url_for('static', filename='ButterBeefBloom.mp3') }}", title: "BUTTER, BEEF, BLOOM" }
];

var audio        = document.getElementById('audio');
var playPauseBtn = document.getElementById('playPauseBtn');
var rewindBtn    = document.getElementById('rewindBtn');
var ffBtn        = document.getElementById('ffBtn');
var progressBar  = document.getElementById('progressBar');
var progressFill = document.getElementById('progressFill');
var timeElapsed  = document.getElementById('timeElapsed');
var timeDuration = document.getElementById('timeDuration');
var statusText   = document.getElementById('statusText');
var statusLine   = document.getElementById('statusLine');
var playerPanel  = document.getElementById('playerPanel');
var vuBars       = document.getElementById('vuBars');
var trackEls     = document.querySelectorAll('.track');

var current = 0;
var playing = false;
var rafId = null;

// Build VU bars
var bars = [];
for (var i = 0; i < 24; i++) {
  var b = document.createElement('div');
  b.className = 'vu-bar';
  b.style.height = '4px';
  vuBars.appendChild(b);
  bars.push(b);
}

function fmt(s) {
  s = Math.floor(s || 0);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function setPlaying(state) {
  playing = state;
  playPauseBtn.innerHTML = state ? '&#9646;&#9646;' : '&#9654;';
  playerPanel.classList.toggle('playing', state);
  statusLine.classList.toggle('playing-state', state);
  statusText.textContent = state ? 'TRANSMITTING' : 'STANDBY';
  if (state) animateBars(); else stopBars();
  // update track buttons
  trackEls.forEach(function(el, i) {
    el.querySelector('.track-btn').innerHTML = (i === current && state) ? '&#9646;&#9646;' : '&#9654;';
  });
}

function loadTrack(idx, autoplay) {
  current = idx;
  audio.src = TRACKS[idx].src;
  progressFill.style.width = '0%';
  timeElapsed.textContent = '0:00';
  timeDuration.textContent = '0:00';
  trackEls.forEach(function(el, i) {
    el.classList.toggle('active', i === idx);
    el.querySelector('.track-btn').innerHTML = '&#9654;';
  });
  if (autoplay) { audio.play(); } else { setPlaying(false); }
}

function animateBars() {
  function tick() {
    for (var i = 0; i < bars.length; i++) {
      bars[i].style.height = (4 + Math.random() * 32) + 'px';
    }
    rafId = requestAnimationFrame(tick);
  }
  cancelAnimationFrame(rafId);
  tick();
}

function stopBars() {
  cancelAnimationFrame(rafId);
  bars.forEach(function(b) { b.style.height = '4px'; });
}

// Track clicks
trackEls.forEach(function(el) {
  el.addEventListener('click', function() {
    var idx = parseInt(el.dataset.index);
    if (idx === current) {
      playing ? audio.pause() : audio.play();
    } else {
      loadTrack(idx, true);
    }
  });
});

playPauseBtn.addEventListener('click', function() {
  if (!audio.src) { loadTrack(0, true); return; }
  playing ? audio.pause() : audio.play();
});

rewindBtn.addEventListener('click', function() {
  audio.currentTime = Math.max(0, audio.currentTime - 10);
});

ffBtn.addEventListener('click', function() {
  audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
});

audio.addEventListener('play',  function() { setPlaying(true); });
audio.addEventListener('pause', function() { setPlaying(false); });
audio.addEventListener('ended', function() {
  var next = (current + 1) % TRACKS.length;
  loadTrack(next, true);
});

audio.addEventListener('timeupdate', function() {
  if (!audio.duration) return;
  progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  timeElapsed.textContent = fmt(audio.currentTime);
  timeDuration.textContent = fmt(audio.duration);
});

progressBar.addEventListener('click', function(e) {
  if (!audio.duration) return;
  var rect = progressBar.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});

// Load first track on init
loadTrack(0, false);
</script>
</body>
</html>

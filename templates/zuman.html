<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zuman</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d14;
      color: #e6e6ff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .player {
      text-align: center;
      padding: 48px 32px;
    }
    h1 {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #c8b8ff;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 14px;
      color: #5a5a7a;
      letter-spacing: 0.08em;
      margin-bottom: 48px;
    }
    audio {
      width: 300px;
      filter: invert(1) hue-rotate(200deg) brightness(0.85);
    }
  </style>
</head>
<body>
  <div class="player">
    <h1>ZUMAN</h1>
    <p class="subtitle">dream ferret</p>
    <audio controls autoplay>
      <source src="{{ url_for('static', filename='Zuman.mp3') }}" type="audio/mpeg">
    </audio>
  </div>
</body>
</html>

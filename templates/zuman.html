<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zuman — Volume 1: Friction</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d14;
      color: #e6e6ff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 20px 56px;
    }

    .player {
      width: 100%;
      max-width: 400px;
    }

    /* ── Header ──────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid #17172a;
    }

    .logo-wrap {
      margin-bottom: 16px;
    }

    .logo-wrap img {
      width: 250px;
      max-width: 100%;
    }

    .album-volume {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6a52d8;
      margin-bottom: 4px;
    }

    .album-name {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.07em;
      color: #9a84f0;
      margin-bottom: 8px;
    }

    .album-byline {
      font-size: 12px;
      color: #525268;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    .private-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      background: rgba(100, 80, 200, 0.07);
      border: 1px solid rgba(100, 80, 200, 0.16);
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #484860;
      text-transform: uppercase;
    }

    /* ── Track list ──────────────────────── */
    .tracklist {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 22px;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      background: #101020;
      border: 1px solid #1b1b2e;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.16s, border-color 0.16s, box-shadow 0.16s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .track:hover {
      background: #151528;
      border-color: #2c2c48;
    }

    /* Active: left-accent via box-shadow (no layout shift), muted bg */
    .track.active {
      background: #131228;
      border-color: #252042;
      box-shadow: inset 3px 0 0 #7a5df9;
    }

    /* Track number */
    .track-num {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      color: #565670;
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .track.active .track-num {
      color: #7a5df9;
    }

    /* Play button — sits left, adjacent to title */
    .track-btn {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: #1c1c30;
      border: 1px solid #282840;
      color: #6868a0;
      font-size: 9px;
      padding-left: 1px; /* optical center of ▶ */
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.16s, color 0.16s, border-color 0.16s;
    }

    .track:hover .track-btn {
      background: #252545;
      border-color: #424268;
      color: #b0a0e8;
    }

    /* Active button: translucent tint — row border is the primary signal */
    .track.active .track-btn {
      background: rgba(122, 93, 249, 0.15);
      border-color: rgba(122, 93, 249, 0.28);
      color: #9a84f0;
    }

    /* Title */
    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-title {
      font-size: 13.5px;
      font-weight: 500;
      color: #a8a0cc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    .track.active .track-title {
      color: #c0b0f0;
      font-weight: 600;
    }

    /* ── Now playing ─────────────────────── */
    .now-playing {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      min-height: 14px;
    }

    .np-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #7a5df9;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .np-dot.live {
      opacity: 1;
      animation: npulse 2s ease-in-out infinite;
    }

    @keyframes npulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1;   }
    }

    .np-title {
      font-size: 11px;
      letter-spacing: 0.07em;
      color: #404058;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Progress ────────────────────────── */
    .progress-wrap {
      margin-bottom: 18px;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: #181830;
      border-radius: 2px;
      cursor: pointer;
      margin-bottom: 7px;
    }

    .progress-fill {
      height: 100%;
      background: #7a5df9;
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
      pointer-events: none;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 10.5px;
      color: #383858;
      font-variant-numeric: tabular-nums;
    }

    /* ── Transport controls ──────────────── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      margin-bottom: 16px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #585878;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.16s;
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl-btn:hover { color: #9080c8; }

    .play-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #7a5df9;
      border: none;
      color: #fff;
      font-size: 18px;
      padding-left: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.16s, transform 0.1s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .play-btn:hover  { background: #8f70ff; transform: scale(1.04); }
    .play-btn:active { transform: scale(0.96); }

    /* ── Bottom controls ─────────────────── */
    .bottom-controls {
      display: flex;
      gap: 8px;
    }

    .play-all-btn {
      flex: 1;
      padding: 11px;
      background: #111128;
      border: 1px solid #242448;
      border-radius: 9px;
      color: #8878c8;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.16s, border-color 0.16s, color 0.16s;
      letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
    }

    .play-all-btn:hover {
      background: #181838;
      border-color: #6a52d8;
      color: #c0b0f0;
    }

    .repeat-btn {
      padding: 11px 14px;
      background: #0e0e1c;
      border: 1px solid #1a1a2c;
      border-radius: 9px;
      color: #383858;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.16s, border-color 0.16s, color 0.16s;
      display: flex;
      align-items: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }

    .repeat-btn.on {
      background: #111128;
      border-color: #4e3db8;
      color: #7a68c8;
    }

    .repeat-btn:hover     { border-color: #282840; }
    .repeat-btn.on:hover  { border-color: #7a5df9; }

    .repeat-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.09em;
    }

    /* ── Footer ──────────────────────────── */
    .footer-logo {
      text-align: center;
      margin-top: 44px;
      padding-top: 28px;
      border-top: 1px solid #17172a;
    }

    .footer-logo img {
      width: 200px;
      max-width: 100%;
      opacity: 0.88;
    }

    audio { display: none; }
  </style>
</head>
<body>
<div class="player">

  <!-- Header -->
  <div class="header">
    <div class="logo-wrap">
      <img src="{{ url_for('static', filename='ZumanLogo.png') }}" alt="Zuman">
    </div>
    <div class="album-volume">Volume 1</div>
    <div class="album-name">Friction</div>
    <div class="album-byline">Murzon &middot; Nova &middot; Alpine</div>
    <span class="private-badge">&#128274;&thinsp; Private &middot; Prototype</span>
  </div>

  <!-- Tracklist -->
  <div class="tracklist">

    <div class="track" data-index="0">
      <span class="track-num">1</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">Zuman</div></div>
    </div>

    <div class="track" data-index="1">
      <span class="track-num">2</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">Passing Strange</div></div>
    </div>

    <div class="track" data-index="2">
      <span class="track-num">3</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">Exotic Symbiotic</div></div>
    </div>

    <div class="track" data-index="3">
      <span class="track-num">4</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">Sympathy for the Goblin</div></div>
    </div>

    <div class="track" data-index="4">
      <span class="track-num">5</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">The Friction Is the Product</div></div>
    </div>

    <div class="track" data-index="5">
      <span class="track-num">6</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">Before the Sparks Catch</div></div>
    </div>

    <div class="track" data-index="6">
      <span class="track-num">7</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">Meatbag Zoo</div></div>
    </div>

    <div class="track" data-index="7">
      <span class="track-num">8</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">Humane</div></div>
    </div>

    <div class="track" data-index="8">
      <span class="track-num">9</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">Meatbag Deluxe</div></div>
    </div>

    <div class="track" data-index="9">
      <span class="track-num">10</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">Captain White</div></div>
    </div>

    <div class="track" data-index="10">
      <span class="track-num">11</span>
      <button class="track-btn" aria-label="Play">&#9654;</button>
      <div class="track-info"><div class="track-title">Porch Light On</div></div>
    </div>

  </div>

  <!-- Now playing indicator -->
  <div class="now-playing">
    <div class="np-dot" id="npDot"></div>
    <span class="np-title" id="npTitle">—</span>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-times">
      <span id="timeElapsed">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>
  </div>

  <!-- Transport -->
  <div class="controls">
    <button class="ctrl-btn" id="prevBtn" title="Previous">&#9198;</button>
    <button class="play-btn" id="playPauseBtn">&#9654;</button>
    <button class="ctrl-btn" id="nextBtn" title="Next">&#9197;</button>
  </div>

  <!-- Play all / repeat -->
  <div class="bottom-controls">
    <button class="play-all-btn" id="playAllBtn">&#9654;&nbsp; Play All</button>
    <button class="repeat-btn" id="repeatBtn">
      <span>&#128257;</span>
      <span class="repeat-label">REPEAT</span>
    </button>
  </div>

  <audio id="audio"></audio>

  <!-- Footer -->
  <div class="footer-logo">
    <img src="{{ url_for('static', filename='GlitchMobTextLogo.png') }}"
         alt="GlitchMob">
  </div>

</div>
<script>
const TRACKS = [
  { src: "{{ url_for('static', filename='Zuman.mp3') }}",                title: "Zuman" },
  { src: "{{ url_for('static', filename='PassingStrange.mp3') }}",       title: "Passing Strange" },
  { src: "{{ url_for('static', filename='ExoticSymbiotic.mp3') }}",      title: "Exotic Symbiotic" },
  { src: "{{ url_for('static', filename='SympathyForTheGoblin.mp3') }}", title: "Sympathy for the Goblin" },
  { src: "{{ url_for('static', filename='FrictionProduct.mp3') }}",      title: "The Friction Is the Product" },
  { src: "{{ url_for('static', filename='BeforeTheSparksCatch.mp3') }}", title: "Before the Sparks Catch" },
  { src: "{{ url_for('static', filename='MeatbagZoo.mp3') }}",           title: "Meatbag Zoo" },
  { src: "{{ url_for('static', filename='Humane.mp3') }}",               title: "Humane" },
  { src: "{{ url_for('static', filename='MeatbagDeluxe.mp3') }}",        title: "Meatbag Deluxe" },
  { src: "{{ url_for('static', filename='CaptainWhite2.mp3') }}",        title: "Captain White" },
  { src: "{{ url_for('static', filename='Porchlight.mp3') }}",           title: "Porch Light On" }
];

const audio        = document.getElementById('audio');
const playPauseBtn = document.getElementById('playPauseBtn');
const prevBtn      = document.getElementById('prevBtn');
const nextBtn      = document.getElementById('nextBtn');
const playAllBtn   = document.getElementById('playAllBtn');
const repeatBtn    = document.getElementById('repeatBtn');
const progressBar  = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const timeElapsed  = document.getElementById('timeElapsed');
const timeDuration = document.getElementById('timeDuration');
const npDot        = document.getElementById('npDot');
const npTitle      = document.getElementById('npTitle');
const trackEls     = document.querySelectorAll('.track');

let current = 0;
let playing = false;
let playAll = false;
let repeat  = false;

function fmt(s) {
  const m = Math.floor(s / 60);
  return `${m}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
}

function setNowPlaying(idx, isPlaying) {
  npTitle.textContent = isPlaying ? TRACKS[idx].title : '—';
  npDot.classList.toggle('live', isPlaying);
}

function loadTrack(idx, autoplay) {
  current = idx;
  audio.src = TRACKS[idx].src;
  trackEls.forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    el.querySelector('.track-btn').innerHTML = (i === idx && autoplay) ? '&#9208;' : '&#9654;';
  });
  progressFill.style.width = '0%';
  timeElapsed.textContent = '0:00';
  timeDuration.textContent = '0:00';
  if (autoplay) {
    audio.play();
    playing = true;
    playPauseBtn.innerHTML = '&#9208;';
  } else {
    playing = false;
    playPauseBtn.innerHTML = '&#9654;';
  }
  setNowPlaying(idx, autoplay);
}

function togglePlay() {
  if (!audio.src || audio.src === window.location.href) {
    loadTrack(0, true);
    return;
  }
  if (playing) {
    audio.pause();
    playing = false;
    playPauseBtn.innerHTML = '&#9654;';
    trackEls[current].querySelector('.track-btn').innerHTML = '&#9654;';
    setNowPlaying(current, false);
  } else {
    audio.play();
    playing = true;
    playPauseBtn.innerHTML = '&#9208;';
    trackEls[current].querySelector('.track-btn').innerHTML = '&#9208;';
    setNowPlaying(current, true);
  }
}

trackEls.forEach(el => {
  el.addEventListener('click', () => {
    const idx = parseInt(el.dataset.index);
    if (idx === current) { togglePlay(); }
    else { loadTrack(idx, true); playAll = false; }
  });
});

playPauseBtn.addEventListener('click', togglePlay);
prevBtn.addEventListener('click', () => loadTrack((current - 1 + TRACKS.length) % TRACKS.length, playing));
nextBtn.addEventListener('click', () => loadTrack((current + 1) % TRACKS.length, playing));

playAllBtn.addEventListener('click', () => { playAll = true; loadTrack(0, true); });

repeatBtn.addEventListener('click', () => {
  repeat = !repeat;
  repeatBtn.classList.toggle('on', repeat);
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  progressFill.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
  timeElapsed.textContent = fmt(audio.currentTime);
  timeDuration.textContent = fmt(audio.duration);
});

progressBar.addEventListener('click', e => {
  if (!audio.duration) return;
  const r = progressBar.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

audio.addEventListener('ended', () => {
  const isLast = current === TRACKS.length - 1;
  if (repeat) {
    if (isLast && playAll)  { loadTrack(0, true); }
    else if (!isLast && playAll) { loadTrack(current + 1, true); }
    else { audio.currentTime = 0; audio.play(); }
  } else if (playAll && !isLast) {
    loadTrack(current + 1, true);
  } else {
    playing = false;
    playPauseBtn.innerHTML = '&#9654;';
    trackEls[current].querySelector('.track-btn').innerHTML = '&#9654;';
    setNowPlaying(current, false);
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>What the Land Keeps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #1a1612;
      color: #f0ece4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .wrap {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .cover {
      width: 100%;
      max-width: 340px;
      display: block;
      margin: 0 auto 36px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.6);
    }

    .btn-read {
      display: block;
      width: 100%;
      padding: 18px 24px;
      background: #c8a96e;
      color: #1a1612;
      font-family: Georgia, serif;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    .btn-read:hover {
      background: #dbbf82;
    }

    .btn-print {
      display: block;
      width: 100%;
      padding: 14px 24px;
      background: transparent;
      color: #a89070;
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid #4a3f2f;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-print:hover {
      border-color: #c8a96e;
      color: #c8a96e;
    }
  </style>
</head>
<body>
<div class="wrap">
  <img class="cover" src="/static/LandKeeps.png" alt="What the Land Keeps cover" />
  <a class="btn-read" href="/ro/read">Open Book</a>
  <a class="btn-print" href="/ro/read?print=1" onclick="this.href='/ro/read'; setTimeout(()=>window.open('/ro/read','_print').print(),400); return false;">Print</a>
</div>
</body>
</html>

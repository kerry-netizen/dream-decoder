<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Still Water</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #f7f4ee;
      color: #1e1e1e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .wrap {
      max-width: 560px;
      width: 100%;
      background: #fffdf8;
      border: 1px solid #e7dece;
      padding: 48px 40px;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 1rem;
      color: #777;
      margin-bottom: 36px;
      font-style: italic;
    }

    h2 {
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 14px;
      font-family: system-ui, sans-serif;
      font-weight: 600;
    }

    .versions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .version-link {
      display: block;
      padding: 18px 20px;
      border: 1px solid #ddd5c8;
      background: #faf6ef;
      color: #1e1e1e;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .version-link:hover {
      background: #f3ede2;
      border-color: #b8a88a;
      text-decoration: none;
    }

    .version-num {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      font-family: system-ui, sans-serif;
      margin-bottom: 4px;
    }

    .version-title {
      font-size: 1.05rem;
      color: #3a2a10;
    }

    .version-note {
      font-size: 0.85rem;
      color: #888;
      margin-top: 3px;
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Still Water</h1>
  <p class="subtitle">A Novel</p>

  <h2>Versions</h2>
  <div class="versions">
    <a class="version-link" href="/ro/v1">
      <div class="version-num">Version 1</div>
      <div class="version-title">Revised Manuscript — Chapterized</div>
    </a>
    <a class="version-link" href="/ro/v2">
      <div class="version-num">Version 2</div>
      <div class="version-title">Still Water — Revised Draft 7</div>
    </a>
  </div>
</div>
</body>
</html>
